<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kindle↔Audio">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#14171c">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' rx='24' fill='%2314171c'/%3E%3Crect x='8' y='8' width='104' height='104' rx='18' fill='none' stroke='%238a9a5b' stroke-width='2'/%3E%3Ctext x='60' y='78' font-size='58' text-anchor='middle' fill='%238a9a5b' font-family='serif'%3E%E2%87%84%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' rx='24' fill='%2314171c'/%3E%3Ctext x='60' y='78' font-size='58' text-anchor='middle' fill='%238a9a5b' font-family='serif'%3E%E2%87%84%3C/text%3E%3C/svg%3E">
<title>Kindle ↔ Audiolibro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Spectral:wght@400;600&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root {
    --ink: #e8e2d4;
    --bg: #14171c;
    --bg-panel: #1c2027;
    --line: #3a4048;
    --accent: #8a9a5b;
    --accent-dim: #5f6b42;
    --muted: #9aa0a8;
    --muted-2: #6b7178;
    --warn: #c97b5a;
    --warn-bg: rgba(201,123,90,0.12);
    --danger: #b5543f;
  }

  body.light {
    --ink: #262420;
    --bg: #ece7da;
    --bg-panel: #ffffff;
    --line: #d8d2c2;
    --accent: #5f7233;
    --accent-dim: #dfe6cd;
    --muted: #6b6a63;
    --muted-2: #8a8880;
    --warn: #a8502e;
    --warn-bg: rgba(168,80,46,0.10);
    --danger: #a8502e;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at top left, rgba(138,154,91,0.08), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(138,154,91,0.05), transparent 60%);
    color: var(--ink);
    font-family: 'Spectral', serif;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px calc(24px + env(safe-area-inset-bottom));
    padding-top: calc(24px + env(safe-area-inset-top));
    transition: background 0.2s, color 0.2s;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
    background-image: radial-gradient(circle, rgba(138,154,91,0.35) 0.6px, transparent 0.6px);
    background-size: 26px 26px;
  }
  body.light::before {
    opacity: 0.35;
    background-image: radial-gradient(circle, rgba(95,114,51,0.25) 0.6px, transparent 0.6px);
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 28px 24px;
    position: relative;
    z-index: 1;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 14px 14px 0 0;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .top-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
  }
  h1 { font-size: 21px; font-weight: 600; margin: 0 0 4px; color: var(--ink); }
  .sub { font-size: 13px; color: var(--muted); margin: 0 0 24px; line-height: 1.5; }

  .icon-btn {
    background: var(--bg); border: 1px solid var(--line); color: var(--muted);
    width: 34px; height: 34px; border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: opacity 0.15s, background 0.15s;
  }
  .icon-btn:active { background: var(--accent-dim); }
  .icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .icon-btn:disabled:active { background: var(--bg); }

  .top-actions { display: flex; gap: 6px; }
  .field { margin-bottom: 18px; }
  label {
    display: block; font-family: 'IBM Plex Mono', monospace; font-size: 10.5px;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%; background: var(--bg); border: 1px solid var(--line); color: var(--ink);
    font-family: 'IBM Plex Mono', monospace; font-size: 15px; padding: 10px 11px;
    border-radius: 8px; -webkit-appearance: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(138,154,91,0.22); }

  select {
    width: 100%; background: var(--bg); border: 1px solid var(--line); color: var(--ink);
    font-family: 'IBM Plex Mono', monospace; font-size: 14px; padding: 10px 11px;
    border-radius: 8px; -webkit-appearance: none; appearance: none;
  }

  .profile-row { display: flex; gap: 8px; }
  .profile-row select { flex: 1; }
  .book-title-input { font-family: 'Spectral', serif; font-size: 16px; font-weight: 600; }

  .duration-inputs, .time-inputs { display: flex; gap: 8px; }
  .duration-inputs > div, .time-inputs > div { flex: 1; }
  .duration-inputs span, .time-inputs span {
    display: block; font-size: 9.5px; color: var(--muted-2); margin-top: 4px; text-align: center;
  }

  .quick-toggle {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent);
    cursor: pointer; margin-top: 6px; display: inline-block; user-select: none;
  }
  .quick-input { margin-top: 8px; display: none; }
  .quick-input.show { display: block; }

  .warning {
    margin-top: 8px; background: var(--warn-bg); border: 1px solid var(--warn); color: var(--warn);
    font-size: 12px; padding: 8px 10px; border-radius: 6px; line-height: 1.4; display: none;
  }
  .warning.show { display: block; }

  .result { margin-top: 24px; padding-top: 20px; border-top: 1px dashed var(--line); }
  .result-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .result-value-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .timestamp, .page-result {
    font-family: 'IBM Plex Mono', monospace; font-size: 38px; font-weight: 600; color: var(--ink);
    letter-spacing: 0.02em; display: flex; align-items: baseline; gap: 2px; flex-wrap: wrap;
  }
  .timestamp .unit, .page-result .unit {
    font-size: 12px; color: var(--accent); margin-right: 8px; font-family: 'IBM Plex Mono', monospace;
  }

  .copy-btn {
    background: var(--accent-dim); border: none; color: var(--ink);
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 8px 12px;
    border-radius: 7px; cursor: pointer; letter-spacing: 0.03em; white-space: nowrap;
    transition: background 0.2s, transform 0.1s;
  }
  .copy-btn:active { transform: scale(0.96); }
  .copy-btn.flash { background: var(--accent); color: #fff; }

  .hint { margin-top: 14px; font-size: 12px; color: var(--muted-2); line-height: 1.5; }
  .total-line {
    font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--muted-2);
    margin-top: 22px; text-align: center; line-height: 1.6;
  }

  .tabs {
    display: flex; gap: 2px; margin-bottom: 24px; background: var(--bg);
    border: 1px solid var(--line); border-radius: 9px; padding: 3px;
  }
  .tab {
    flex: 1; text-align: center; padding: 10px 0; font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted);
    cursor: pointer; border-radius: 7px; transition: background 0.15s, color 0.15s;
    user-select: none; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .tab svg { width: 14px; height: 14px; flex-shrink: 0; }
  .tab.active { background: var(--accent-dim); color: var(--ink); }

  .panel { display: none; opacity: 0; transform: translateY(4px); transition: opacity 0.18s ease, transform 0.18s ease; }
  .panel.active { display: block; }
  .panel.show { opacity: 1; transform: translateY(0); }

  details.ref-details {
    border: 1px solid var(--line); border-radius: 9px; padding: 0; margin-bottom: 18px; background: var(--bg);
  }
  details.ref-details summary {
    padding: 11px 13px; font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); cursor: pointer;
    list-style: none; display: flex; justify-content: space-between; align-items: center;
  }
  details.ref-details summary::-webkit-details-marker { display: none; }
  details.ref-details summary::after { content: "+"; font-size: 15px; color: var(--accent); }
  details.ref-details[open] summary::after { content: "–"; }
  .ref-body { padding: 0 13px 15px; }
  .ref-point-block { margin-bottom: 16px; }
  .ref-point-block:last-child { margin-bottom: 0; }
  .ref-point-title {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
  }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 60;
  }
  .overlay.hidden { display: none; }
  .modal-card {
    background: var(--bg-panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 26px 22px; max-width: 380px; width: 100%; max-height: 80vh; overflow-y: auto;
  }
  .modal-card h2 { font-size: 17px; margin: 0 0 10px; }
  .modal-card p { font-size: 13.5px; color: var(--muted); line-height: 1.55; margin: 0 0 18px; }
  .modal-card button.primary-btn {
    width: 100%; background: var(--accent-dim); color: var(--ink); border: none; padding: 12px;
    border-radius: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer;
  }
  .modal-btn-row { display: flex; gap: 8px; }
  .modal-btn-row button {
    flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .modal-btn-row .btn-cancel { background: var(--bg); color: var(--muted); border: 1px solid var(--line); }
  .modal-btn-row .btn-danger { background: var(--danger); color: #fff; }

  .faq-item { border-bottom: 1px solid var(--line); padding-bottom: 12px; margin-bottom: 12px; }
  .faq-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .faq-q {
    font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: var(--ink);
    font-weight: 600; margin-bottom: 6px; letter-spacing: 0.01em;
  }
  .faq-a { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* ---------- Splash screen ---------- */
  #splash {
    position: fixed; inset: 0; z-index: 100; background: #14171c;
    background-image:
      radial-gradient(ellipse at top left, rgba(138,154,91,0.10), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(138,154,91,0.07), transparent 60%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.5s ease; cursor: pointer;
  }
  #splash.fade-out { opacity: 0; pointer-events: none; }
  #splash .splash-icon {
    width: 56px; height: 56px; border: 1px solid #8a9a5b; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; color: #8a9a5b;
    font-family: 'Spectral', serif; font-size: 26px; margin-bottom: 18px;
    animation: splashPulse 1.8s ease-in-out infinite; transition: transform 0.15s ease;
  }
  #splash.tapped .splash-icon { transform: scale(0.88); }
  @keyframes splashPulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
  #splash h2 {
    color: #e8e2d4; font-family: 'Spectral', serif; font-size: 20px; font-weight: 600;
    margin: 0 0 8px; text-align: center; padding: 0 30px;
  }
  #splash .splash-eyebrow {
    font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.16em;
    text-transform: uppercase; color: #6b7178; margin-bottom: 30px;
  }
  #splash .splash-tap-hint {
    font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.1em;
    text-transform: uppercase; color: #8a9a5b; opacity: 0;
    transition: opacity 0.6s ease; animation: tapPulse 2s ease-in-out infinite;
    animation-delay: 0.6s;
  }
  #splash .splash-tap-hint.visible { opacity: 0.85; }
  @keyframes tapPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.95; } }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-icon">⇄</div>
  <h2>Book-Audiobook Calculator</h2>
  <div class="splash-eyebrow" id="splashEyebrow"></div>
  <div class="splash-tap-hint" id="splashTapHint"></div>
</div>

<div class="overlay hidden" id="helpOverlay">
  <div class="modal-card">
    <h2 id="helpTitle"></h2>
    <div id="faqList"></div>
    <button class="primary-btn" id="helpDismiss" style="margin-top:18px;"></button>
  </div>
</div>

<div class="overlay hidden" id="confirmOverlay">
  <div class="modal-card">
    <h2 id="confirmTitle"></h2>
    <p id="confirmText"></p>
    <div class="modal-btn-row">
      <button class="btn-cancel" id="confirmCancel"></button>
      <button class="btn-danger" id="confirmDeleteBtn"></button>
    </div>
  </div>
</div>

<div class="overlay hidden" id="infoOverlay">
  <div class="modal-card">
    <p id="infoText" style="margin-bottom:18px;"></p>
    <button class="primary-btn" id="infoDismiss"></button>
  </div>
</div>

<div class="card">
  <div class="top-row">
    <div>
      <div class="eyebrow" id="txtEyebrow"></div>
      <h1 id="txtAppTitle"></h1>
    </div>
    <div class="top-actions">
      <button class="icon-btn" id="langBtn" title="lang">ES</button>
      <button class="icon-btn" id="themeBtn" title="theme">☾</button>
      <button class="icon-btn" id="helpBtn" title="help">?</button>
    </div>
  </div>
  <p class="sub" id="txtSubtitle"></p>

  <div class="field">
    <label id="txtProfileLabel"></label>
    <div class="profile-row">
      <select id="profileSelect"></select>
      <button class="icon-btn" id="newProfileBtn" title="new">+</button>
      <button class="icon-btn" id="deleteProfileBtn" title="delete">🗑</button>
    </div>
  </div>

  <div class="field">
    <label id="txtBookTitleLabel"></label>
    <input type="text" id="bookTitle" class="book-title-input" placeholder="">
  </div>

  <div class="field">
    <label id="txtTotalPagesLabel"></label>
    <div class="duration-inputs">
      <div>
        <input type="text" id="totalPages" inputmode="numeric" pattern="[0-9]*">
        <span id="txtPagesUnit"></span>
      </div>
    </div>
  </div>

  <div class="field">
    <label id="txtTotalDurationLabel"></label>
    <div class="duration-inputs">
      <div><input type="text" id="h" inputmode="numeric" pattern="[0-9]*"><span id="txtHoursUnit1"></span></div>
      <div><input type="text" id="m" inputmode="numeric" pattern="[0-9]*"><span id="txtMinutesUnit1"></span></div>
      <div><input type="text" id="s" inputmode="numeric" pattern="[0-9]*"><span id="txtSecondsUnit1"></span></div>
    </div>
    <span class="quick-toggle" id="quickToggle1"></span>
    <div class="quick-input" id="quickInput1"><input type="text" id="quickDuration" placeholder="hh:mm:ss"></div>
    <div class="warning" id="warnDuration"></div>
  </div>

  <details class="ref-details" id="refDetails">
    <summary id="txtRefLabel"></summary>
    <div class="ref-body">

      <div class="ref-point-block">
        <div class="ref-point-title" id="txtRefALabel"></div>
        <div class="field" style="margin-bottom:12px;">
          <input type="text" id="refPageA" inputmode="numeric" pattern="[0-9]*">
          <span id="txtRefPageLabelA" style="display:block;font-size:9.5px;color:var(--muted-2);margin-top:4px;text-align:center;"></span>
        </div>
        <div class="time-inputs">
          <div><input type="text" id="refHA" inputmode="numeric" pattern="[0-9]*"><span id="txtHoursUnit2A"></span></div>
          <div><input type="text" id="refMA" inputmode="numeric" pattern="[0-9]*"><span id="txtMinutesUnit2A"></span></div>
          <div><input type="text" id="refSA" inputmode="numeric" pattern="[0-9]*"><span id="txtSecondsUnit2A"></span></div>
        </div>
      </div>

      <div class="ref-point-block">
        <div class="ref-point-title" id="txtRefBLabel"></div>
        <div class="field" style="margin-bottom:12px;">
          <input type="text" id="refPageB" inputmode="numeric" pattern="[0-9]*">
          <span id="txtRefPageLabelB" style="display:block;font-size:9.5px;color:var(--muted-2);margin-top:4px;text-align:center;"></span>
        </div>
        <div class="time-inputs">
          <div><input type="text" id="refHB" inputmode="numeric" pattern="[0-9]*"><span id="txtHoursUnit2B"></span></div>
          <div><input type="text" id="refMB" inputmode="numeric" pattern="[0-9]*"><span id="txtMinutesUnit2B"></span></div>
          <div><input type="text" id="refSB" inputmode="numeric" pattern="[0-9]*"><span id="txtSecondsUnit2B"></span></div>
        </div>
      </div>

      <div class="warning" id="warnRef"></div>
    </div>
  </details>

  <div class="tabs">
    <div class="tab active" data-tab="p2a">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 5c-1.5-1.2-3.6-1.5-6-1V17c2.4-.5 4.5-.2 6 1 1.5-1.2 3.6-1.5 6-1V4c-2.4-.5-4.5-.2-6 1Z"/><path d="M12 5v13"/></svg>
      <span id="txtTabP2A"></span>
    </div>
    <div class="tab" data-tab="a2p">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 14v-2a8 8 0 0 1 16 0v2"/><rect x="2.5" y="14" width="4" height="6" rx="1.5"/><rect x="17.5" y="14" width="4" height="6" rx="1.5"/></svg>
      <span id="txtTabA2P"></span>
    </div>
  </div>

  <div class="panel active" id="panel-p2a">
    <div class="field">
      <label id="txtCurrentPageLabel"></label>
      <input type="text" id="page" inputmode="numeric" pattern="[0-9]*" style="font-size:20px;font-weight:600;">
      <div class="warning" id="warnCurrentPage"></div>
    </div>
    <div class="result">
      <div class="result-label"><span id="txtResultAudioLabel"></span></div>
      <div class="result-value-row">
        <div class="timestamp" id="output">
          <span class="unit">h</span><span id="outH">00</span>
          <span class="unit">m</span><span id="outM">00</span>
          <span class="unit">s</span><span id="outS">00</span>
        </div>
        <button class="copy-btn" id="copyAudioBtn"></button>
      </div>
      <p class="hint" id="txtHintP2A"></p>
    </div>
  </div>

  <div class="panel" id="panel-a2p">
    <div class="field">
      <label id="txtCurrentAudioLabel"></label>
      <div class="time-inputs">
        <div><input type="text" id="ch" inputmode="numeric" pattern="[0-9]*"><span id="txtHoursUnit3"></span></div>
        <div><input type="text" id="cm" inputmode="numeric" pattern="[0-9]*"><span id="txtMinutesUnit3"></span></div>
        <div><input type="text" id="cs" inputmode="numeric" pattern="[0-9]*"><span id="txtSecondsUnit3"></span></div>
      </div>
      <div class="warning" id="warnCurrentTime"></div>
    </div>
    <div class="result">
      <div class="result-label"><span id="txtResultPageLabel"></span></div>
      <div class="result-value-row">
        <div class="page-result"><span id="outPage">0</span><span class="unit" id="outPageOfText"></span></div>
        <button class="copy-btn" id="copyPageBtn"></button>
      </div>
      <p class="hint" id="txtHintA2P"></p>
    </div>
  </div>

  <div class="total-line" id="totalLine"></div>
</div>

<script>
(function () {
  const dict = {
    es: {
      eyebrow: "Senda entre formatos",
      appTitle: "Kindle ↔ Audiolibro",
      subtitle: "Configura los datos del libro una vez, y luego convierte en cualquier dirección.",
      profileLabel: "Libro guardado",
      bookTitleLabel: "Título del libro",
      bookTitlePlaceholder: "p. ej. Las puertas de la Casa de la Muerte",
      totalPagesLabel: "Páginas totales del libro",
      pagesUnit: "páginas",
      totalDurationLabel: "Duración total del audiolibro",
      hoursUnit: "horas", minutesUnit: "minutos", secondsUnit: "segundos",

  // ---------- Core calculation ----------
  function totalAudioSeconds() {
    return (parseInt(hInput.value) || 0) * 3600 + (parseInt(mInput.value) || 0) * 60 + (parseInt(sInput.value) || 0);
  }
  function toSeconds(h, m, s) { return (parseInt(h)||0)*3600 + (parseInt(m)||0)*60 + (parseInt(s)||0); }

  // Returns { a, b, modelUsed } where time(page) = a*page + b
  function getModel(totalPages, totalSeconds) {
    const pageA = parseInt(refPageAInput.value) || 0;
    const secA = toSeconds(refHAInput.value, refMAInput.value, refSAInput.value);
    const pageB = parseInt(refPageBInput.value) || 0;
    const secB = toSeconds(refHBInput.value, refMBInput.value, refSBInput.value);

    const providedA = pageA > 0 || secA > 0;
    const providedB = pageB > 0 || secB > 0;

    let refIssue = false;
    if (providedA && (pageA > totalPages || (secA > totalSeconds && totalSeconds > 0))) refIssue = 'range';
    if (providedB && (pageB > totalPages || (secB > totalSeconds && totalSeconds > 0))) refIssue = 'range';

    const validA = providedA && pageA <= totalPages && (totalSeconds === 0 || secA <= totalSeconds);
    const validB = providedB && pageB <= totalPages && (totalSeconds === 0 || secB <= totalSeconds);

    if (validA && validB) {
      if (pageA === pageB) {
        return { a: totalSeconds / totalPages, b: 0, modelUsed: 'linear', refIssue: 'samePage' };
      }
      const a = (secB - secA) / (pageB - pageA);
      const b = secA - a * pageA;
      return { a, b, modelUsed: 'twoPoints', refIssue };
    }

    if (validA || validB) {
      const page = validA ? pageA : pageB;
      const sec = validA ? secA : secB;
      if (page <= 0 || page >= totalPages) {
        return { a: totalSeconds / totalPages, b: 0, modelUsed: 'linear', refIssue };
      }
      const frac = page / totalPages;
      let offset = (sec - frac * totalSeconds) / (1 - frac);
      if (!isFinite(offset) || offset < 0) offset = 0;
      if (offset > totalSeconds) offset = 0;
      const a = (totalSeconds - offset) / totalPages;
      const b = offset;
      return { a, b, modelUsed: 'onePoint', refIssue };
    }

    return { a: totalPages > 0 ? totalSeconds / totalPages : 0, b: 0, modelUsed: 'linear', refIssue };
  }

  function recalc() {
    const totalPages = parseInt(totalPagesInput.value) || 1;
    const totalSeconds = totalAudioSeconds();

    const badDuration = [mInput, sInput, refMAInput, refSAInput, refMBInput, refSBInput, cmInput, csInput]
      .some(el => { const v = parseInt(el.value); return v > 59 || v < 0; });
    warnDuration.textContent = t('warnDuration');
    warnDuration.classList.toggle('show', badDuration);

    const model = getModel(totalPages, totalSeconds);

    if (model.refIssue === 'range') {
      warnRef.textContent = t('warnRefPage');
      warnRef.classList.add('show');
    } else if (model.refIssue === 'samePage') {
      warnRef.textContent = t('warnRefSamePage');
      warnRef.classList.add('show');
    } else {
      warnRef.classList.remove('show');
    }

    const modelName = model.modelUsed === 'twoPoints' ? t('modelTwoPoints')
                     : model.modelUsed === 'onePoint' ? t('modelOnePoint')
                     : t('modelLinear');

    const totH = Math.floor(totalSeconds / 3600);
    const totM = Math.floor((totalSeconds % 3600) / 60);
    const totS = totalSeconds % 60;
    totalLine.textContent =
      `${t('totalLinePrefix')}: ${totH}h ${pad(totM)}m ${pad(totS)}s — ${t('bookWord')}: ${totalPages} ${t('pagesWord')} — ${t('modelLabel')}: ${modelName}`;

    const rawPage = parseInt(pageInput.value) || 0;
    warnCurrentPage.textContent = t('warnCurrentPage');
    warnCurrentPage.classList.toggle('show', rawPage > totalPages);
    const page = Math.min(Math.max(rawPage, 0), totalPages);
    let targetSeconds = Math.round(model.a * page + model.b);
    targetSeconds = Math.min(Math.max(targetSeconds, 0), totalSeconds || targetSeconds);
    const h = Math.floor(targetSeconds / 3600);
    const m = Math.floor((targetSeconds % 3600) / 60);
    const s = targetSeconds % 60;
    outH.textContent = pad(h); outM.textContent = pad(m); outS.textContent = pad(s);

    const rawCurrentSeconds = toSeconds(chInput.value, cmInput.value, csInput.value);
    warnCurrentTime.textContent = t('warnCurrentTime');
    warnCurrentTime.classList.toggle('show', rawCurrentSeconds > totalSeconds && totalSeconds > 0);
    const currentSeconds = Math.min(rawCurrentSeconds, totalSeconds || rawCurrentSeconds);
    let targetPage = model.a !== 0 ? Math.round((currentSeconds - model.b) / model.a) : 0;
    targetPage = Math.min(Math.max(targetPage, 0), totalPages);
    outPage.textContent = targetPage;
    outPageOfText.textContent = `${t('of')} ${totalPages}`;
  }

  [totalPagesInput, hInput, mInput, sInput, pageInput, chInput, cmInput, csInput,
   refPageAInput, refHAInput, refMAInput, refSAInput, refPageBInput, refHBInput, refMBInput, refSBInput]
    .forEach(el => { el.addEventListener('input', () => { recalc(); profileFromFields(); }); });
  bookTitleInput.addEventListener('input', profileFromFields);

  // ---------- Init ----------
  applyTheme();
  fieldsFromProfile(getActiveProfile());
  populateProfileSelect();
  updateDeleteButtonState();
  if (state.lastTab === 'a2p') {
    document.querySelector('.tab[data-tab="a2p"]').classList.add('active');
    document.querySelector('.tab[data-tab="p2a"]').classList.remove('active');
    document.getElementById('panel-a2p').classList.add('active', 'show');
    document.getElementById('panel-p2a').classList.remove('active');
  } else {
    document.getElementById('panel-p2a').classList.add('show');
  }
  applyLang();

  // ---------- Splash screen: stays until tapped ----------
  const splash = document.getElementById('splash');
  const splashTapHint = document.getElementById('splashTapHint');
  setTimeout(() => splashTapHint.classList.add('visible'), 550);

  function dismissSplash() {
    splash.classList.add('tapped');
    setTimeout(() => {
      splash.classList.add('fade-out');
      setTimeout(() => { splash.style.display = 'none'; }, 500);
    }, 120);
  }
  splash.addEventListener('click', dismissSplash);
  splash.addEventListener('touchend', function (e) { e.preventDefault(); dismissSplash(); }, { passive: false });
})();
</script>

</body>
