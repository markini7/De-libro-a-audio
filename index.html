<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kindle↔Audio">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#14171c">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' rx='24' fill='%2314171c'/%3E%3Crect x='8' y='8' width='104' height='104' rx='18' fill='none' stroke='%238a9a5b' stroke-width='2'/%3E%3Ctext x='60' y='78' font-size='58' text-anchor='middle' fill='%238a9a5b' font-family='serif'%3E%E2%87%84%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' rx='24' fill='%2314171c'/%3E%3Ctext x='60' y='78' font-size='58' text-anchor='middle' fill='%238a9a5b' font-family='serif'%3E%E2%87%84%3C/text%3E%3C/svg%3E">
<title>Kindle ↔ Audiolibro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Spectral:wght@400;600&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root {
    --ink: #e8e2d4;
    --bg: #14171c;
    --bg-panel: #1c2027;
    --line: #3a4048;
    --accent: #8a9a5b;
    --accent-dim: #5f6b42;
    --muted: #9aa0a8;
    --muted-2: #6b7178;
    --warn: #c97b5a;
    --warn-bg: rgba(201,123,90,0.12);
  }

  body.light {
    --ink: #262420;
    --bg: #ece7da;
    --bg-panel: #ffffff;
    --line: #d8d2c2;
    --accent: #5f7233;
    --accent-dim: #dfe6cd;
    --muted: #6b6a63;
    --muted-2: #8a8880;
    --warn: #a8502e;
    --warn-bg: rgba(168,80,46,0.10);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at top left, rgba(138,154,91,0.08), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(138,154,91,0.05), transparent 60%);
    color: var(--ink);
    font-family: 'Spectral', serif;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px calc(24px + env(safe-area-inset-bottom));
    padding-top: calc(24px + env(safe-area-inset-top));
    transition: background 0.2s, color 0.2s;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 28px 24px;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 14px 14px 0 0;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  h1 {
    font-size: 21px;
    font-weight: 600;
    margin: 0 0 4px;
    color: var(--ink);
  }

  .sub {
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 24px;
    line-height: 1.5;
  }

  .icon-btn {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--muted);
    width: 34px; height: 34px;
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icon-btn:active { background: var(--accent-dim); }

  .top-actions { display: flex; gap: 6px; }

  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    padding: 10px 11px;
    border-radius: 8px;
    -webkit-appearance: none;
  }
  input:focus { outline: none; border-color: var(--accent); }

  select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    padding: 10px 11px;
    border-radius: 8px;
    -webkit-appearance: none;
    appearance: none;
  }

  .profile-row { display: flex; gap: 8px; }
  .profile-row select { flex: 1; }

  .book-title-input { font-family: 'Spectral', serif; font-size: 16px; font-weight: 600; }

  .duration-inputs, .time-inputs { display: flex; gap: 8px; }
  .duration-inputs > div, .time-inputs > div { flex: 1; }
  .duration-inputs span, .time-inputs span {
    display: block;
    font-size: 9.5px;
    color: var(--muted-2);
    margin-top: 4px;
    text-align: center;
  }

  .quick-toggle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    cursor: pointer;
    margin-top: 6px;
    display: inline-block;
    user-select: none;
  }

  .quick-input { margin-top: 8px; display: none; }
  .quick-input.show { display: block; }

  .warning {
    margin-top: 8px;
    background: var(--warn-bg);
    border: 1px solid var(--warn);
    color: var(--warn);
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 6px;
    line-height: 1.4;
    display: none;
  }
  .warning.show { display: block; }

  .result {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px dashed var(--line);
  }

  .result-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .result-value-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .timestamp, .page-result {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 38px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.02em;
    display: flex;
    align-items: baseline;
    gap: 2px;
    flex-wrap: wrap;
  }
  .timestamp .unit, .page-result .unit {
    font-size: 12px;
    color: var(--accent);
    margin-right: 8px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .copy-btn {
    background: var(--accent-dim);
    border: none;
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 7px;
    cursor: pointer;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .copy-btn:active { opacity: 0.7; }

  .hint {
    margin-top: 14px;
    font-size: 12px;
    color: var(--muted-2);
    line-height: 1.5;
  }

  .total-line {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--muted-2);
    margin-top: 22px;
    text-align: center;
    line-height: 1.6;
  }

  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 24px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 3px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-radius: 7px;
    transition: background 0.15s, color 0.15s;
    user-select: none;
  }
  .tab.active { background: var(--accent-dim); color: var(--ink); }

  .panel { display: none; }
  .panel.active { display: block; }

  details.ref-details {
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 0;
    margin-bottom: 18px;
    background: var(--bg);
  }
  details.ref-details summary {
    padding: 11px 13px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  details.ref-details summary::-webkit-details-marker { display: none; }
  details.ref-details summary::after {
    content: "+";
    font-size: 15px;
    color: var(--accent);
  }
  details.ref-details[open] summary::after { content: "–"; }
  .ref-body { padding: 0 13px 15px; }

  .help-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    z-index: 50;
  }
  .help-overlay.hidden { display: none; }
  .help-card {
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 26px 22px;
    max-width: 380px;
    width: 100%;
  }
  .help-card h2 {
    font-size: 17px;
    margin: 0 0 10px;
  }
  .help-card p {
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.55;
    margin: 0 0 18px;
  }
  .help-card button {
    width: 100%;
    background: var(--accent-dim);
    color: var(--ink);
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="help-overlay hidden" id="helpOverlay">
  <div class="help-card">
    <h2 id="helpTitle"></h2>
    <p id="helpText"></p>
    <button id="helpDismiss"></button>
  </div>
</div>

<div class="card">
  <div class="top-row">
    <div>
      <div class="eyebrow" id="txtEyebrow"></div>
      <h1 id="txtAppTitle"></h1>
    </div>
    <div class="top-actions">
      <button class="icon-btn" id="langBtn" title="lang">ES</button>
      <button class="icon-btn" id="themeBtn" title="theme">☾</button>
      <button class="icon-btn" id="helpBtn" title="help">?</button>
    </div>
  </div>
  <p class="sub" id="txtSubtitle"></p>

  <div class="field">
    <label id="txtProfileLabel"></label>
    <div class="profile-row">
      <select id="profileSelect"></select>
      <button class="icon-btn" id="newProfileBtn" title="new">+</button>
      <button class="icon-btn" id="deleteProfileBtn" title="delete">🗑</button>
    </div>
  </div>

  <div class="field">
    <label id="txtBookTitleLabel"></label>
    <input type="text" id="bookTitle" class="book-title-input" placeholder="">
  </div>

  <div class="field">
    <label id="txtTotalPagesLabel"></label>
    <div class="duration-inputs">
      <div>
        <input type="number" id="totalPages" min="1" inputmode="numeric">
        <span id="txtPagesUnit"></span>
      </div>
    </div>
  </div>

  <div class="field">
    <label id="txtTotalDurationLabel"></label>
    <div class="duration-inputs">
      <div>
        <input type="number" id="h" min="0" inputmode="numeric">
        <span id="txtHoursUnit1"></span>
      </div>
      <div>
        <input type="number" id="m" min="0" max="59" inputmode="numeric">
        <span id="txtMinutesUnit1"></span>
      </div>
      <div>
        <input type="number" id="s" min="0" max="59" inputmode="numeric">
        <span id="txtSecondsUnit1"></span>
      </div>
    </div>
    <span class="quick-toggle" id="quickToggle1"></span>
    <div class="quick-input" id="quickInput1">
      <input type="text" id="quickDuration" placeholder="hh:mm:ss">
    </div>
    <div class="warning" id="warnDuration"></div>
  </div>

  <details class="ref-details" id="refDetails">
    <summary id="txtRefLabel"></summary>
    <div class="ref-body">
      <div class="field" style="margin-bottom:12px;">
        <input type="number" id="refPage" min="0" inputmode="numeric">
        <span id="txtRefPageLabel" style="display:block;font-size:9.5px;color:var(--muted-2);margin-top:4px;text-align:center;"></span>
      </div>
      <div class="time-inputs">
        <div>
          <input type="number" id="refH" min="0" inputmode="numeric">
          <span id="txtHoursUnit2"></span>
        </div>
        <div>
          <input type="number" id="refM" min="0" max="59" inputmode="numeric">
          <span id="txtMinutesUnit2"></span>
        </div>
        <div>
          <input type="number" id="refS" min="0" max="59" inputmode="numeric">
          <span id="txtSecondsUnit2"></span>
        </div>
      </div>
      <div class="warning" id="warnRef"></div>
    </div>
  </details>

  <div class="tabs">
    <div class="tab active" data-tab="p2a" id="txtTabP2A"></div>
    <div class="tab" data-tab="a2p" id="txtTabA2P"></div>
  </div>

  <div class="panel active" id="panel-p2a">
    <div class="field">
      <label id="txtCurrentPageLabel"></label>
      <input type="number" id="page" min="0" inputmode="numeric" style="font-size:20px;font-weight:600;">
      <div class="warning" id="warnCurrentPage"></div>
    </div>

    <div class="result">
      <div class="result-label"><span id="txtResultAudioLabel"></span></div>
      <div class="result-value-row">
        <div class="timestamp" id="output">
          <span class="unit">h</span><span id="outH">00</span>
          <span class="unit">m</span><span id="outM">00</span>
          <span class="unit">s</span><span id="outS">00</span>
        </div>
        <button class="copy-btn" id="copyAudioBtn"></button>
      </div>
      <p class="hint" id="txtHintP2A"></p>
    </div>
  </div>

  <div class="panel" id="panel-a2p">
    <div class="field">
      <label id="txtCurrentAudioLabel"></label>
      <div class="time-inputs">
        <div>
          <input type="number" id="ch" min="0" inputmode="numeric">
          <span id="txtHoursUnit3"></span>
        </div>
        <div>
          <input type="number" id="cm" min="0" max="59" inputmode="numeric">
          <span id="txtMinutesUnit3"></span>
        </div>
        <div>
          <input type="number" id="cs" min="0" max="59" inputmode="numeric">
          <span id="txtSecondsUnit3"></span>
        </div>
      </div>
      <div class="warning" id="warnCurrentTime"></div>
    </div>

    <div class="result">
      <div class="result-label"><span id="txtResultPageLabel"></span></div>
      <div class="result-value-row">
        <div class="page-result"><span id="outPage">0</span><span class="unit" id="outPageOfText"></span></div>
        <button class="copy-btn" id="copyPageBtn"></button>
      </div>
      <p class="hint" id="txtHintA2P"></p>
    </div>
  </div>

  <div class="total-line" id="totalLine"></div>
</div>

<script>
(function () {
  // ---------- i18n ----------
  const dict = {
    es: {
      eyebrow: "Senda entre formatos",
      appTitle: "Kindle ↔ Audiolibro",
      subtitle: "Configura los datos del libro una vez, y luego convierte en cualquier dirección.",
      profileLabel: "Libro guardado",
      newProfileOption: "+ Nuevo libro",
      bookTitleLabel: "Título del libro",
      bookTitlePlaceholder: "p. ej. Las puertas de la Casa de la Muerte",
      totalPagesLabel: "Páginas totales del libro",
      pagesUnit: "páginas",
      totalDurationLabel: "Duración total del audiolibro",
      hoursUnit: "horas", minutesUnit: "minutos", secondsUnit: "segundos",
      quickToggleShow: "escribir todo junto (hh:mm:ss)",
      quickToggleHide: "usar campos separados",
      refLabel: "Punto de referencia (mejora mucho la precisión)",
      refPageLabel: "página conocida",
      tabP2A: "Página → Audio",
      tabA2P: "Audio → Página",
      currentPageLabel: "Página actual en el Kindle",
      resultAudioLabel: "Salta el audio a",
      hintP2A: "Es una estimación lineal (asume ritmo de narración constante). Suele dejarte muy cerca — a partir de ahí, unos segundos de oído y ya está.",
      currentAudioLabel: "Minuto actual del audiolibro",
      resultPageLabel: "Deberías estar sobre la página",
      hintA2P: "Misma estimación lineal a la inversa: te da un número redondo de página, no exacto al párrafo.",
      copy: "Copiar",
      copied: "¡Copiado!",
      warnRefPage: "El punto de referencia (página) es mayor que el total de páginas del libro. Se ignorará hasta que lo corrijas.",
      warnRefTime: "El punto de referencia (tiempo) es mayor que la duración total del audiolibro. Se ignorará hasta que lo corrijas.",
      warnCurrentPage: "Esa página es mayor que el total de páginas del libro.",
      warnCurrentTime: "Ese tiempo es mayor que la duración total del audiolibro.",
      warnDuration: "Revisa los minutos/segundos: deben estar entre 0 y 59.",
      totalLinePrefix: "Duración total",
      bookWord: "Libro",
      pagesWord: "páginas",
      offsetLabel: "Desfase inicial",
      helpTitle: "¿Qué es el punto de referencia?",
      helpText: "Es un dato real tuyo: una página del Kindle y el minuto exacto del audio en el que estabas en ese momento. Con eso la app calcula cuánto tiempo de audio se dedica a cosas como agradecimientos o el reparto de personajes (que ocupan pocas páginas pero se narran igual), y ajusta el resto del cálculo para que sea más preciso que una simple regla de tres.",
      helpDismiss: "Entendido",
      of: "de",
      confirmDelete: "¿Eliminar este libro guardado?",
      newBookDefaultTitle: "Libro sin título"
    },
    en: {
      eyebrow: "A path between formats",
      appTitle: "Kindle ↔ Audiobook",
      subtitle: "Set up the book's data once, then convert in either direction.",
      profileLabel: "Saved book",
      newProfileOption: "+ New book",
      bookTitleLabel: "Book title",
      bookTitlePlaceholder: "e.g. Deadhouse Gates",
      totalPagesLabel: "Total pages in the book",
      pagesUnit: "pages",
      totalDurationLabel: "Total audiobook duration",
      hoursUnit: "hours", minutesUnit: "minutes", secondsUnit: "seconds",
      quickToggleShow: "type it all at once (hh:mm:ss)",
      quickToggleHide: "use separate fields",
      refLabel: "Reference point (greatly improves accuracy)",
      refPageLabel: "known page",
      tabP2A: "Page → Audio",
      tabA2P: "Audio → Page",
      currentPageLabel: "Current Kindle page",
      resultAudioLabel: "Jump the audio to",
      hintP2A: "This is a linear estimate (assumes constant narration speed). It usually gets you very close — from there, a few seconds of listening will do it.",
      currentAudioLabel: "Current audiobook time",
      resultPageLabel: "You should be around page",
      hintA2P: "Same linear estimate in reverse: gives you a rounded page number, not exact to the paragraph.",
      copy: "Copy",
      copied: "Copied!",
      warnRefPage: "The reference page is greater than the book's total pages. It will be ignored until you fix it.",
      warnRefTime: "The reference time is greater than the audiobook's total duration. It will be ignored until you fix it.",
      warnCurrentPage: "That page is greater than the book's total pages.",
      warnCurrentTime: "That time is greater than the audiobook's total duration.",
      warnDuration: "Check the minutes/seconds: they must be between 0 and 59.",
      totalLinePrefix: "Total duration",
      bookWord: "Book",
      pagesWord: "pages",
      offsetLabel: "Initial offset",
      helpTitle: "What's the reference point?",
      helpText: "It's a real data point from you: a Kindle page and the exact audio minute you were at, at that moment. With that, the app figures out how much audio time goes to things like acknowledgments or the cast of characters (which take up few pages but are narrated in full), and adjusts the rest of the calculation to be more precise than a simple proportion.",
      helpDismiss: "Got it",
      of: "of",
      confirmDelete: "Delete this saved book?",
      newBookDefaultTitle: "Untitled book"
    }
  };

  const STORAGE_KEY = 'kindleAudioSync_v1';

  // Safe storage wrapper: falls back to in-memory if localStorage is blocked
  // (e.g. inside a sandboxed preview). Works fully once opened as a normal
  // page in Safari / added to the home screen.
  const memoryFallback = {};
  const storage = {
    get(key) {
      try { return localStorage.getItem(key); }
      catch (e) { return memoryFallback[key] ?? null; }
    },
    set(key, val) {
      try { localStorage.setItem(key, val); }
      catch (e) { memoryFallback[key] = val; }
    }
  };

  function detectLang() {
    const saved = storage.get('lang');
    if (saved && dict[saved]) return saved;
    const nav = (navigator.language || 'en').slice(0, 2).toLowerCase();
    return dict[nav] ? nav : 'en';
  }

  let lang = detectLang();

  function t(key) { return dict[lang][key] || dict.en[key] || key; }

  function applyLang() {
    document.documentElement.lang = lang;
    document.title = t('appTitle');
    document.getElementById('txtEyebrow').textContent = t('eyebrow');
    document.getElementById('txtAppTitle').textContent = t('appTitle');
    document.getElementById('txtSubtitle').textContent = t('subtitle');
    document.getElementById('txtProfileLabel').textContent = t('profileLabel');
    document.getElementById('txtBookTitleLabel').textContent = t('bookTitleLabel');
    document.getElementById('bookTitle').placeholder = t('bookTitlePlaceholder');
    document.getElementById('txtTotalPagesLabel').textContent = t('totalPagesLabel');
    document.getElementById('txtPagesUnit').textContent = t('pagesUnit');
    document.getElementById('txtTotalDurationLabel').textContent = t('totalDurationLabel');
    document.getElementById('txtHoursUnit1').textContent = t('hoursUnit');
    document.getElementById('txtMinutesUnit1').textContent = t('minutesUnit');
    document.getElementById('txtSecondsUnit1').textContent = t('secondsUnit');
    document.getElementById('txtHoursUnit2').textContent = t('hoursUnit');
    document.getElementById('txtMinutesUnit2').textContent = t('minutesUnit');
    document.getElementById('txtSecondsUnit2').textContent = t('secondsUnit');
    document.getElementById('txtHoursUnit3').textContent = t('hoursUnit');
    document.getElementById('txtMinutesUnit3').textContent = t('minutesUnit');
    document.getElementById('txtSecondsUnit3').textContent = t('secondsUnit');
    document.getElementById('txtRefLabel').textContent = t('refLabel');
    document.getElementById('txtRefPageLabel').textContent = t('refPageLabel');
    document.getElementById('txtTabP2A').textContent = t('tabP2A');
    document.getElementById('txtTabA2P').textContent = t('tabA2P');
    document.getElementById('txtCurrentPageLabel').textContent = t('currentPageLabel');
    document.getElementById('txtResultAudioLabel').textContent = t('resultAudioLabel');
    document.getElementById('txtHintP2A').textContent = t('hintP2A');
    document.getElementById('txtCurrentAudioLabel').textContent = t('currentAudioLabel');
    document.getElementById('txtResultPageLabel').textContent = t('resultPageLabel');
    document.getElementById('txtHintA2P').textContent = t('hintA2P');
    document.getElementById('copyAudioBtn').textContent = t('copy');
    document.getElementById('copyPageBtn').textContent = t('copy');
    document.getElementById('helpTitle').textContent = t('helpTitle');
    document.getElementById('helpText').textContent = t('helpText');
    document.getElementById('helpDismiss').textContent = t('helpDismiss');
    document.getElementById('langBtn').textContent = lang.toUpperCase();
    quickToggle1.textContent = quickShown ? t('quickToggleHide') : t('quickToggleShow');
    populateProfileSelect();
    recalc();
  }

  // ---------- Elements ----------
  const totalPagesInput = document.getElementById('totalPages');
  const hInput = document.getElementById('h');
  const mInput = document.getElementById('m');
  const sInput = document.getElementById('s');
  const totalLine = document.getElementById('totalLine');
  const bookTitleInput = document.getElementById('bookTitle');

  const refPageInput = document.getElementById('refPage');
  const refHInput = document.getElementById('refH');
  const refMInput = document.getElementById('refM');
  const refSInput = document.getElementById('refS');

  const pageInput = document.getElementById('page');
  const outH = document.getElementById('outH');
  const outM = document.getElementById('outM');
  const outS = document.getElementById('outS');

  const chInput = document.getElementById('ch');
  const cmInput = document.getElementById('cm');
  const csInput = document.getElementById('cs');
  const outPage = document.getElementById('outPage');
  const outPageOfText = document.getElementById('outPageOfText');

  const warnDuration = document.getElementById('warnDuration');
  const warnRef = document.getElementById('warnRef');
  const warnCurrentPage = document.getElementById('warnCurrentPage');
  const warnCurrentTime = document.getElementById('warnCurrentTime');

  const quickToggle1 = document.getElementById('quickToggle1');
  const quickInput1 = document.getElementById('quickInput1');
  const quickDuration = document.getElementById('quickDuration');
  let quickShown = false;

  const profileSelect = document.getElementById('profileSelect');
  const newProfileBtn = document.getElementById('newProfileBtn');
  const deleteProfileBtn = document.getElementById('deleteProfileBtn');

  const langBtn = document.getElementById('langBtn');
  const themeBtn = document.getElementById('themeBtn');
  const helpBtn = document.getElementById('helpBtn');
  const helpOverlay = document.getElementById('helpOverlay');
  const helpDismiss = document.getElementById('helpDismiss');

  const copyAudioBtn = document.getElementById('copyAudioBtn');
  const copyPageBtn = document.getElementById('copyPageBtn');

  function pad(n) { return String(n).padStart(2, '0'); }

  // ---------- Profiles (saved books) ----------
  function loadState() {
    try {
      const raw = storage.get(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { profiles: [], activeId: null, theme: 'dark', seenHelp: false, lastTab: 'p2a' };
  }

  let state = loadState();

  function saveState() {
    storage.set(STORAGE_KEY, JSON.stringify(state));
  }

  function defaultProfile() {
    return {
      id: 'p_' + Date.now(),
      title: '',
      totalPages: 400,
      h: 10, m: 0, s: 0,
      refPage: 0, refH: 0, refM: 0, refS: 0
    };
  }

  function getActiveProfile() {
    let p = state.profiles.find(p => p.id === state.activeId);
    if (!p) {
      if (state.profiles.length === 0) {
        p = defaultProfile();
        state.profiles.push(p);
      } else {
        p = state.profiles[0];
      }
      state.activeId = p.id;
      saveState();
    }
    return p;
  }

  function populateProfileSelect() {
    profileSelect.innerHTML = '';
    state.profiles.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.title || t('newBookDefaultTitle');
      if (p.id === state.activeId) opt.selected = true;
      profileSelect.appendChild(opt);
    });
  }

  function fieldsFromProfile(p) {
    bookTitleInput.value = p.title || '';
    totalPagesInput.value = p.totalPages;
    hInput.value = p.h; mInput.value = p.m; sInput.value = p.s;
    refPageInput.value = p.refPage;
    refHInput.value = p.refH; refMInput.value = p.refM; refSInput.value = p.refS;
  }

  function profileFromFields() {
    const p = getActiveProfile();
    p.title = bookTitleInput.value.trim();
    p.totalPages = parseInt(totalPagesInput.value) || 1;
    p.h = parseInt(hInput.value) || 0;
    p.m = parseInt(mInput.value) || 0;
    p.s = parseInt(sInput.value) || 0;
    p.refPage = parseInt(refPageInput.value) || 0;
    p.refH = parseInt(refHInput.value) || 0;
    p.refM = parseInt(refMInput.value) || 0;
    p.refS = parseInt(refSInput.value) || 0;
    saveState();
    populateProfileSelect();
  }

  profileSelect.addEventListener('change', () => {
    state.activeId = profileSelect.value;
    saveState();
    fieldsFromProfile(getActiveProfile());
    recalc();
  });

  newProfileBtn.addEventListener('click', () => {
    const p = defaultProfile();
    state.profiles.push(p);
    state.activeId = p.id;
    saveState();
    populateProfileSelect();
    fieldsFromProfile(p);
    bookTitleInput.focus();
    recalc();
  });

  deleteProfileBtn.addEventListener('click', () => {
    if (state.profiles.length <= 1) return;
    if (!confirm(t('confirmDelete'))) return;
    state.profiles = state.profiles.filter(p => p.id !== state.activeId);
    state.activeId = state.profiles[0].id;
    saveState();
    populateProfileSelect();
    fieldsFromProfile(getActiveProfile());
    recalc();
  });

  // ---------- Theme ----------
  function applyTheme() {
    document.body.classList.toggle('light', state.theme === 'light');
    themeBtn.textContent = state.theme === 'light' ? '☀' : '☾';
  }
  themeBtn.addEventListener('click', () => {
    state.theme = state.theme === 'light' ? 'dark' : 'light';
    saveState();
    applyTheme();
  });

  // ---------- Language ----------
  langBtn.addEventListener('click', () => {
    lang = lang === 'es' ? 'en' : 'es';
    storage.set('lang', lang);
    applyLang();
  });

  // ---------- Help overlay ----------
  function maybeShowHelp() {
    if (!state.seenHelp) {
      helpOverlay.classList.remove('hidden');
    }
  }
  helpBtn.addEventListener('click', () => helpOverlay.classList.remove('hidden'));
  helpDismiss.addEventListener('click', () => {
    helpOverlay.classList.add('hidden');
    state.seenHelp = true;
    saveState();
  });

  // ---------- Quick duration entry ----------
  quickToggle1.addEventListener('click', () => {
    quickShown = !quickShown;
    quickInput1.classList.toggle('show', quickShown);
    quickToggle1.textContent = quickShown ? t('quickToggleHide') : t('quickToggleShow');
    if (quickShown) {
      quickDuration.value = `${hInput.value}:${pad(mInput.value)}:${pad(sInput.value)}`;
      quickDuration.focus();
    }
  });
  quickDuration.addEventListener('input', () => {
    const parts = quickDuration.value.split(':').map(x => parseInt(x));
    if (parts.length === 3 && parts.every(n => !isNaN(n))) {
      hInput.value = parts[0]; mInput.value = parts[1]; sInput.value = parts[2];
      recalc();
      profileFromFields();
    }
  });

  // ---------- Tabs ----------
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t2 => t2.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      state.lastTab = tab.dataset.tab;
      saveState();
    });
  });

  // ---------- Copy buttons ----------
  function flashCopied(btn) {
    const original = btn.textContent;
    btn.textContent = t('copied');
    setTimeout(() => { btn.textContent = original === t('copied') ? t('copy') : original; }, 1200);
  }
  copyAudioBtn.addEventListener('click', () => {
    const text = `${outH.textContent}:${outM.textContent}:${outS.textContent}`;
    navigator.clipboard?.writeText(text).catch(() => {});
    flashCopied(copyAudioBtn);
  });
  copyPageBtn.addEventListener('click', () => {
    navigator.clipboard?.writeText(outPage.textContent).catch(() => {});
    flashCopied(copyPageBtn);
  });

  // ---------- Core calculation ----------
  function totalAudioSeconds() {
    return (parseInt(hInput.value) || 0) * 3600 +
           (parseInt(mInput.value) || 0) * 60 +
           (parseInt(sInput.value) || 0);
  }

  function getOffset(totalPages, totalSeconds, refValid) {
    if (!refValid) return 0;
    const refPage = parseInt(refPageInput.value) || 0;
    const refSeconds = (parseInt(refHInput.value) || 0) * 3600 +
                        (parseInt(refMInput.value) || 0) * 60 +
                        (parseInt(refSInput.value) || 0);
    if (refPage <= 0 || refPage >= totalPages || refSeconds <= 0) return 0;
    const frac = refPage / totalPages;
    let offset = (refSeconds - frac * totalSeconds) / (1 - frac);
    if (!isFinite(offset) || offset < 0) offset = 0;
    if (offset > totalSeconds) offset = 0;
    return offset;
  }

  function recalc() {
    const totalPages = parseInt(totalPagesInput.value) || 1;
    const totalSeconds = totalAudioSeconds();

    // Validate minutes/seconds ranges
    const badDuration = [mInput, sInput, refMInput, refSInput, cmInput, csInput]
      .some(el => { const v = parseInt(el.value); return v > 59 || v < 0; });
    warnDuration.textContent = t('warnDuration');
    warnDuration.classList.toggle('show', badDuration);

    // Validate reference point against totals
    const refPage = parseInt(refPageInput.value) || 0;
    const refSeconds = (parseInt(refHInput.value) || 0) * 3600 +
                        (parseInt(refMInput.value) || 0) * 60 +
                        (parseInt(refSInput.value) || 0);
    let refValid = true;
    if (refPage > totalPages) {
      warnRef.textContent = t('warnRefPage');
      warnRef.classList.add('show');
      refValid = false;
    } else if (refSeconds > totalSeconds && totalSeconds > 0) {
      warnRef.textContent = t('warnRefTime');
      warnRef.classList.add('show');
      refValid = false;
    } else {
      warnRef.classList.remove('show');
    }

    const offset = getOffset(totalPages, totalSeconds, refValid);

    const totH = Math.floor(totalSeconds / 3600);
    const totM = Math.floor((totalSeconds % 3600) / 60);
    const totS = totalSeconds % 60;
    const offM = Math.floor(offset / 60);
    totalLine.textContent =
      `${t('totalLinePrefix')}: ${totH}h ${pad(totM)}m ${pad(totS)}s — ${t('bookWord')}: ${totalPages} ${t('pagesWord')}` +
      (offset > 0 ? ` — ${t('offsetLabel')}: ~${offM} min` : '');

    // Página -> Audio
    const rawPage = parseInt(pageInput.value) || 0;
    warnCurrentPage.textContent = t('warnCurrentPage');
    warnCurrentPage.classList.toggle('show', rawPage > totalPages);
    const page = Math.min(Math.max(rawPage, 0), totalPages);
    const targetSeconds = Math.round(offset + (page / totalPages) * (totalSeconds - offset));
    const h = Math.floor(targetSeconds / 3600);
    const m = Math.floor((targetSeconds % 3600) / 60);
    const s = targetSeconds % 60;
    outH.textContent = pad(h);
    outM.textContent = pad(m);
    outS.textContent = pad(s);

    // Audio -> Página
    const rawCurrentSeconds =
      (parseInt(chInput.value) || 0) * 3600 +
      (parseInt(cmInput.value) || 0) * 60 +
      (parseInt(csInput.value) || 0);
    warnCurrentTime.textContent = t('warnCurrentTime');
    warnCurrentTime.classList.toggle('show', rawCurrentSeconds > totalSeconds && totalSeconds > 0);
    const currentSeconds = Math.min(rawCurrentSeconds, totalSeconds || rawCurrentSeconds);
    const denom = (totalSeconds - offset);
    const fraction = denom > 0 ? (currentSeconds - offset) / denom : 0;
    const targetPage = Math.round(Math.max(fraction, 0) * totalPages);
    outPage.textContent = Math.min(targetPage, totalPages);
    outPageOfText.textContent = `${t('of')} ${totalPages}`;
  }

  [totalPagesInput, hInput, mInput, sInput, pageInput, chInput, cmInput, csInput,
   refPageInput, refHInput, refMInput, refSInput].forEach(el => {
    el.addEventListener('input', () => { recalc(); profileFromFields(); });
  });
  bookTitleInput.addEventListener('input', profileFromFields);

  // ---------- Init ----------
  applyTheme();
  fieldsFromProfile(getActiveProfile());
  populateProfileSelect();
  if (state.lastTab === 'a2p') {
    document.querySelector('.tab[data-tab="a2p"]').click();
  }
  applyLang();
  maybeShowHelp();
})();
</script>

</body>
</html>
